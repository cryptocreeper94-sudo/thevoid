    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "THE VOID",
      "alternateName": "THE VOID — Scream Into the Abyss",
      "description": "A safe, cathartic voice-first venting app. Record your frustrations and get AI-powered responses from 5 unique personalities — Smart-ass, Calming, Therapist, Hype Man, and Roast Master.",
      "url": "https://intothevoid.app",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free tier — 1 vent per day"
        },
        {
          "@type": "Offer",
          "price": "9.99",
          "priceCurrency": "USD",
          "description": "Premium — Unlimited venting",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        }
      ],
      "creator": {
        "@type": "Organization",
        "name": "DarkWave Studios",
        "url": "https://DarkwaveStudios.io"
      }
    }

  <body>
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
